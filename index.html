<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PNCK TIX</title>
  <link rel="icon" type="image/png" href="favicon-ticket.png">
  <style>
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #fbf6f3;
      color: #0e4e71;
      font-family: "Noto Sans JP", sans-serif;
    }

    body {
      overflow: hidden;
    }

    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 6px 6px 8px;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    .head {
      text-align: center;
      padding: 4px 0 8px;
      flex: 0 0 auto;
    }

    .title {
      margin: 0 0 6px;
      font-size: clamp(28px, 6vw, 44px);
      line-height: 1.1;
      font-weight: 500;
      letter-spacing: 0.01em;
    }

    .sub {
      margin: 0 auto;
      max-width: 42em;
      color: #587280;
      font-size: clamp(14px, 3.8vw, 16px);
      line-height: 1.7;
    }

    .frame-wrap {
      background: rgba(255,255,255,0.82);
      border: 1px solid #d8dde3;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 8px 28px rgba(14, 78, 113, 0.08);
      flex: 1 1 auto;
      min-height: 0;
    }

    iframe {
      display: block;
      width: 100%;
      height: 100%;
      border: 0;
      background: #fff;
    }

    @media (max-width: 767px) {
      .wrap {
        padding: 4px 4px 6px;
      }

      .head {
        padding: 4px 0 6px;
      }

      .frame-wrap {
        border-radius: 14px;
      }

      .title {
        margin-bottom: 4px;
      }

      .sub {
        line-height: 1.6;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="head">
      <h1 class="title">PNCK TIX</h1>
      <p class="sub">
        作品・日時・席種を選んで申込内容を追加し、最後に申込者情報をご入力ください。
      </p>
    </div>

    <div class="frame-wrap">
      <iframe
        src="https://script.google.com/macros/s/AKfycbyebg8xdN5xLML1uKvF8NIQ3uMvJsKOAWeUQ7i4GbMQQbuwPEYpSveLRZrYs79gqtD7/exec"
        title="PNCK TIX Ticket Form"
        loading="lazy"
        referrerpolicy="no-referrer">
      </iframe>
    </div>
  </div>
</body>
</html>
